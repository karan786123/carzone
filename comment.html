<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback - CarZone</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: #333;
    }

    header {
      background: linear-gradient(135deg, #1c1c1c, #2e86de);
      color: white;
      padding: 30px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 3em;
      margin-bottom: 10px;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-weight: bold;
    }

    nav a:hover {
      text-decoration: underline;
    }

    main {
      flex: 1;
      padding: 40px 20px;
    }

    h2 {
      text-align: center;
      color: #2e86de;
      margin-bottom: 30px;
    }

    form {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    form label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    form input, form textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
    }

    form button {
      margin-top: 20px;
      width: 100%;
      background: #2e86de;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 16px;
    }

    form button:hover {
      background: #1c6dc1;
    }

    footer {
      background-color: #1c1c1c;
      color: #ccc;
      text-align: center;
      padding: 30px 20px;
    }

    .footer-links a {
      margin: 0 15px;
      color: #ccc;
      text-decoration: none;
      font-size: 0.95em;
    }

    .footer-links a:hover {
      color: #fff;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <h1>CarZone Feedback</h1>
    <p>We'd Love to Hear From You</p>
    <nav>
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="comment.html">Feedback</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <!-- Main Form Section -->
  <main>
    <h2>Leave a Comment</h2>
    <form method="POST" action="https://api.web3forms.com/submit">
      <input type="hidden" name="access_key" value="9c02eda5-81ca-4a81-b691-bf5db7bf162b">

      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required>

      <label for="comment">Your Comment</label>
      <textarea id="comment" name="message" rows="5" required></textarea>

      <button type="submit">Submit Comment</button>
    </form>
  </main>

  <!-- Footer -->
  <footer>
    <div class="footer-links">
      <a href="index.html">Home</a>
      <a href="gallery.html">Gallery</a>
      <a href="comment.html">Feedback</a>
      <a href="contact.html">Contact</a>
    </div>
    <p>&copy; 2025 CarZone Workshop. All rights reserved.</p>
  </footer>

</body>
</html>
